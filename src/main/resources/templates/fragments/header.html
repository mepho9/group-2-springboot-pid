<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head>
    <meta charset="utf-8">
    <title>Header fragment</title>
  </head>
  <body>
    <header class="navbar navbar-inverse navbar-fixed-top" th:fragment="header">
      <div class="container">
        <div class="navbar-header">
          <h1><a class="navbar-brand" href="#">Réservations</a></h1>
        </div>
        <div class="navbar-collapse collapse">
          <ul class="nav navbar-nav">
            <li th:classappend="${module == 'home' ? 'active' : ''}">
              <a href="#" th:href="@{/}">Home</a>
            </li>
            <li th:classappend="${module == 'artists' ? 'active' : ''}">
              <a href="#" th:href="@{/artists}">Artists</a>
            </li>
          </ul>
        </div>
        <nav>
          <a th:href="@{/}">Home</a> |
          <a th:href="@{/shows}">Shows</a> |
          <a th:href="@{/representations}">Representations</a> |
          <a th:href="@{/artists}">Artists</a>

          <span style="float:right;">
    <span th:if="${#authorization.expression('isAuthenticated()')}">
      <a th:href="@{/profile}">Profile</a>
      <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit">Logout</button>
      </form>
    </span>

    <span th:if="${#authorization.expression('isAnonymous()')}">
      <a th:href="@{/login}">Login</a>
    </span>
  </span>
        </nav>
        <hr/>


        <div style="float:right">
          <p sec:authorize="!isAuthenticated()">Vous n'êtes pas connecté.<br>
            <a th:href="@{/login}" class="nav-link">Se connecter</a>
          <p sec:authorize="!isAuthenticated()">
            <a th:href="@{/register}" class="nav-link">S'inscrire</a>
          </p>
          
          <div sec:authorize="isAuthenticated()">
            <p>Bonjour <span sec:authentication="principal.username">Bob</span>!</p>
            <p><a th:href="@{/profile}">Mon profil</a></p>
            <form th:action="@{/logout}" method="post" class="nav-link">
              <button class="unset">Se déconnecter</button>
            </form>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
