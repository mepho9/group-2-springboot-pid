<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.mx/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Fiche d'une représentation</title>
</head>
<body>
<div class="container">
    <div layout:fragment="content">
        <article>
            <h1 th:text="'Représentation du ' + ${date} + ' à ' + ${heure}">
                Représentation du 15/01/2020 à 13:30
            </h1>
            <p th:if="${success}" th:text="${success}" style="color:green"></p>
            <p th:if="${error}" th:text="${error}" style="color:red"></p>

            <p>
                <strong>Spectacle :</strong>
                <span th:text="${representation.show.title}">Ayiti</span>
            </p>

            <p>
                <strong>Lieu :</strong>
                <span th:if="${representation.location != null}"
                      th:text="${representation.location.designation}">
                    Art Center
                </span>
                <span th:if="${representation.location == null and representation.show.location != null}"
                      th:text="${representation.show.location.designation}">
                    Art Center
                </span>
                <em th:if="${representation.location == null and representation.show.location == null}">
                    à déterminer
                </em>
            </p>

            <p>
                <a th:href="@{/representations/{id}/reserve(id=${representation.id})}">
                    Réserver cette représentation
                </a>
            </p>
        </article>

        <nav>
            <a th:href="@{/representations}">Retour à l'index</a>
        </nav>
    </div>
</div>
</body>
</html>
