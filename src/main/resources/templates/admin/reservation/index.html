<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.mx/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Gestion des réservations</title>
</head>
<body>
<div class="container">
    <div layout:fragment="content">
        <h1 th:text="${title}">Gestion des réservations</h1>
        <p th:if="${success}" th:text="${success}" style="color:green"></p>
        <p th:if="${error}" th:text="${error}" style="color:red"></p>

        <p th:if="${#lists.isEmpty(reservations)}">
            Aucune réservation enregistrée.
        </p>

        <table th:unless="${#lists.isEmpty(reservations)}" border="1" cellpadding="6">
            <thead>
            <tr>
                <th>ID</th>
                <th>Utilisateur</th>
                <th>Date réservation</th>
                <th>Spectacle</th>
                <th>Représentation</th>
                <th>Quantité</th>
                <th>Statut</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="reservation : ${reservations}">
                <td th:text="${reservation.id}">1</td>

                <td th:text="${reservation.user.login}">user</td>

                <td th:text="${#temporals.format(reservation.bookingDate, 'dd/MM/yyyy HH:mm')}">
                    01/01/2026 20:00
                </td>

                <td>
                    <span th:if="${!#lists.isEmpty(reservation.representationReservations)}"
                          th:text="${reservation.representationReservations[0].representation.show.title}">
                        Titre du spectacle
                    </span>
                </td>

                <td>
                    <span th:if="${!#lists.isEmpty(reservation.representationReservations)}"
                          th:text="${#temporals.format(reservation.representationReservations[0].representation.when, 'dd/MM/yyyy HH:mm')}">
                        01/01/2026 20:00
                    </span>
                </td>

                <td>
                    <span th:if="${!#lists.isEmpty(reservation.representationReservations)}"
                          th:text="${reservation.representationReservations[0].quantity}">
                        1
                    </span>
                </td>

                <td>
    <span th:if="${reservation.status == 'PENDING'}"
          style="color:orange; font-weight:bold;">
        PENDING
    </span>

                    <span th:if="${reservation.status == 'CONFIRMED'}"
                          style="color:green; font-weight:bold;">
        CONFIRMED
    </span>

                    <span th:if="${reservation.status == 'CANCELLED'}"
                          style="color:red; font-weight:bold;">
        CANCELLED
    </span>

                    <span th:if="${reservation.status != 'PENDING' and reservation.status != 'CONFIRMED' and reservation.status != 'CANCELLED'}"
                          th:text="${reservation.status}">
        STATUS
    </span>
                </td>
                <td>
                    <form th:if="${reservation.status == 'PENDING'}"
                          th:action="@{/admin/reservations/{id}/confirm(id=${reservation.id})}"
                          method="post">
                        <button type="submit">Confirmer</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
